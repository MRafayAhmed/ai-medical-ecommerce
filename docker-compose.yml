services:
  db:
    image: mysql:8.0
    container_name: medical-db
    restart: always
    environment:
      MYSQL_DATABASE: medical_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: user
      MYSQL_PASSWORD: user_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: medical-backend
    restart: always
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      APP_KEY: base64:Wx/TrSeJ4HXo46Jgi1On7UDtD2MVFLmdTYuCAv4ecnI=
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: medical_db
      DB_USERNAME: user
      DB_PASSWORD: user_password
      SERVER_NAME: ":80"
      SESSION_DRIVER: file
      SANCTUM_STATEFUL_DOMAINS: "localhost:3000,127.0.0.1:3000,localhost:8000"
    depends_on:
      - db
    ports:
      - "8000:80"
    volumes:
      - .:/app
      - /app/vendor

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medical-frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  phpmyadmin:
    image: phpmyadmin
    container_name: medical-phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_ARBITRARY: 1
      MYSQL_ROOT_PASSWORD: root_password

volumes:
  db_data:
